services:
  panel:
    build: .
    restart: unless-stopped
    environment:
      # When deployed in Coolify, the Coolify API is reachable as "coolify:8080"
      # from the same Docker network that Coolify uses.
      COOLIFY_URL: "http://coolify:8080"
      COOLIFY_TOKEN: "${COOLIFY_TOKEN}"
    # config.yaml is mounted via Coolify's File Storage feature
    # (Application -> Storages -> File Mount -> /config/config.yaml),
    # so it doesn't need to be in the repo.
    labels:
      # Attach Authentik forward-auth middleware (defined as dynamic config
      # in Coolify: Server -> Proxy -> Dynamic Configurations).
      - "coolify.traefik.middlewares=authentik-auth@file"
