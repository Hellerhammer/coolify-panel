services:
  panel:
    build: .
    restart: unless-stopped
    container_name: coolify-panel
    environment:
      # NOTE: do NOT use the name COOLIFY_URL — Coolify reserves that and
      # auto-injects the deployed app's OWN FQDN into it, which clobbers any
      # value we set here. The Go side reads COOLIFY_API_URL to avoid this.
      # Internal Docker hostname inside Coolify's network:
      COOLIFY_API_URL: "http://coolify:8080"
      COOLIFY_TOKEN: "${COOLIFY_TOKEN}"
      # CONFIG_YAML holds the entire panel config as a multiline string.
      # Set it in Coolify's Environment Variables UI (enable "Is Multiline").
      CONFIG_YAML: "${CONFIG_YAML}"
    healthcheck:
      test: ["CMD", "/panel", "-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      # Attach Authentik forward-auth middleware (defined as dynamic config
      # in Coolify: Server -> Proxy -> Dynamic Configurations).
      - "coolify.traefik.middlewares=authentik-auth@file"
 